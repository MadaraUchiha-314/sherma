repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false

      - id: sync-requirements
        name: sync requirements.txt
        entry: bash -c 'uv export --no-hashes --no-dev --extra streamlit --no-emit-project --no-annotate > requirements.txt.tmp && echo "." >> requirements.txt.tmp && if ! diff -q requirements.txt requirements.txt.tmp > /dev/null 2>&1; then mv requirements.txt.tmp requirements.txt && echo "requirements.txt was out of date and has been updated. Please stage and re-commit." && exit 1; else rm requirements.txt.tmp && exit 0; fi'
        language: system
        always_run: true
        pass_filenames: false
