# Declarative Skill Agent
# A general-purpose assistant that discovers and uses skills to complete tasks.
# Follows the skill agent loop: discover skills → execute → reflect → respond.
# Includes conversation summarization to manage context window in long sessions.
# Tool nodes and conditional edges for tool calls are auto-injected.

manifest_version: 1

prompts:
  - id: discover-skills
    version: "1.0.0"
    instructions: >
      You have access to a catalog of skills. Here are the available skills:
      ${available_skills}

      Given the user's request:
      1. Call load_skill_md ONCE for the most relevant skill from the catalog above.
      2. After loading, respond with a brief text summary.
      When a loaded skill is no longer needed, call unload_skill to
      free context window space and unbind its tools.
      IMPORTANT: Do NOT repeat tool calls. Call each tool at most once,
      then reply with text (no tool calls).

  - id: plan-and-execute
    version: "1.0.0"
    instructions: >
      Based on the loaded skills, plan and execute the user's request.
      Use the available tools to accomplish the task. Be direct and efficient.
      ${summary_context}

  - id: reflect
    version: "1.0.0"
    instructions: >
      Review the results so far. If you have enough information to give the
      user a useful answer, respond with "TASK_COMPLETE" followed by the answer.
      Err on the side of completing — a partial but helpful answer is better
      than unnecessary extra rounds.
      Only respond with "NEEDS_MORE_WORK" if critical information is clearly missing.

  - id: task-summarize
    version: "1.0.0"
    instructions: >
      The task is not yet complete. Briefly summarize progress and what
      remains. This will inform the next attempt.

  - id: context-summarize
    version: "1.0.0"
    instructions: >
      Summarize the conversation below into a concise paragraph.
      Capture key topics, decisions, tool results, and pending questions.
      ${previous_summaries}
      Write ONLY the summary paragraph — no preamble, no formatting.

  - id: resummarize
    version: "1.0.0"
    instructions: >
      Below are multiple conversation summaries accumulated over time.
      Condense ALL of them into a single concise summary that preserves
      the most important information.
      Write ONLY the condensed summary — no preamble, no formatting.

llms:
  - id: openai-gpt-4o-mini
    version: "1.0.0"
    provider: openai
    model_name: gpt-4o-mini

skills:
  - id: weather
    version: "1.0.0"
    skill_card_path: ../skills/weather/skill-card.json

agents:
  skill-agent:
    langgraph_config:
      recursion_limit: 100
    state:
      fields:
        - name: messages
          type: list
          default: []
        # ── Summarization state ──
        - name: summary_messages
          type: list
          default: []
        - name: summarized_until
          type: int
          default: 0
        - name: summary_summarized_until
          type: int
          default: 0

    graph:
      entry_point: discover_skills

      nodes:
        # ── Core skill agent loop ───────────────────────────────────

        - name: discover_skills
          type: call_llm
          args:
            llm:
              id: openai-gpt-4o-mini
              version: "1.0.0"
            prompt:
              - role: system
                content: 'template(prompts["discover-skills"]["instructions"], {"available_skills": string(skills)})'
              - role: messages
                content: 'state.messages'
            tools:
              - id: load_skill_md
              - id: unload_skill
            state_updates:
              messages: '[llm_response]'

        - name: execute
          type: call_llm
          args:
            llm:
              id: openai-gpt-4o-mini
              version: "1.0.0"
            prompt:
              - role: system
                content: >-
                  template(
                    prompts["plan-and-execute"]["instructions"],
                    {"summary_context":
                      size(state.summary_messages) > 0
                      ? "Summary of earlier conversation:\n"
                        + state.summary_messages.join("\n")
                      : ""
                    }
                  )
              - role: messages
                content: 'state.messages.slice(state.summarized_until, size(state.messages))'
            use_tools_from_loaded_skills: true
            state_updates:
              messages: '[llm_response]'

        - name: reflect
          type: call_llm
          args:
            llm:
              id: openai-gpt-4o-mini
              version: "1.0.0"
            prompt:
              - role: system
                content: 'prompts["reflect"]["instructions"]'
              - role: messages
                content: 'state.messages.slice(state.summarized_until, size(state.messages))'
            state_updates:
              messages: '[llm_response]'

        - name: task_summarize
          type: call_llm
          args:
            llm:
              id: openai-gpt-4o-mini
              version: "1.0.0"
            prompt:
              - role: system
                content: 'prompts["task-summarize"]["instructions"]'
              - role: messages
                content: 'state.messages.slice(state.summarized_until, size(state.messages))'
            state_updates:
              messages: '[llm_response]'

        # ── Conversation summarization ──────────────────────────────
        # Phase 1: re-summarize accumulated summaries if > 5
        # Phase 2: summarize unsummarized messages if > 10

        - name: check_summaries
          type: data_transform
          args:
            expression: '{}'

        - name: resummarize
          type: call_llm
          args:
            llm: { id: openai-gpt-4o-mini }
            prompt:
              - role: system
                content: 'prompts["resummarize"]["instructions"]'
              - role: human
                content: 'state.summary_messages.join("\n---\n")'
            state_updates:
              summary_messages: '[llm_response.content]'
              summary_summarized_until: '0'

        - name: check_messages
          type: data_transform
          args:
            expression: '{}'

        - name: context_summarize
          type: call_llm
          args:
            llm: { id: openai-gpt-4o-mini }
            prompt:
              - role: system
                content: >-
                  template(
                    prompts["context-summarize"]["instructions"],
                    {"previous_summaries":
                      size(state.summary_messages) > 0
                      ? "Previous summaries:\n" + state.summary_messages.join("\n---\n")
                      : "No previous summaries."
                    }
                  )
              - role: messages
                content: 'state.messages.slice(state.summarized_until, size(state.messages))'
            state_updates:
              summary_messages: 'state.summary_messages + [llm_response.content]'
              summarized_until: 'size(state.messages) - 6'

      edges:
        - source: discover_skills
          target: execute

        - source: execute
          target: reflect

        # reflect → task complete or continue
        - source: reflect
          branches:
            - condition: 'state.messages[size(state.messages) - 1]["content"].contains("TASK_COMPLETE")'
              target: __end__
          default: task_summarize

        # task_summarize → check if context needs summarization
        - source: task_summarize
          target: check_summaries

        # Phase 1: re-summarize summaries if > 5 accumulated
        - source: check_summaries
          branches:
            - condition: 'size(state.summary_messages) - state.summary_summarized_until > 5'
              target: resummarize
          default: check_messages

        - source: resummarize
          target: check_messages

        # Phase 2: summarize messages if > 10 unsummarized
        - source: check_messages
          branches:
            - condition: 'size(state.messages) - state.summarized_until > 10'
              target: context_summarize
          default: execute

        - source: context_summarize
          target: execute
